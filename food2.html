<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--green:#1a7f4b;--green-bg:#e8f7ef;--green-dot:#22c55e;
--yellow:#92610a;--yellow-bg:#fef9e7;--yellow-dot:#f59e0b;
--red:#b91c1c;--red-bg:#fef2f2;--red-dot:#ef4444;
--border:#e5e7eb;--text:#111827;--muted:#6b7280;--surface:#f9fafb;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:var(--text);min-height:100vh}
header{padding:2.5rem 1.5rem 1rem;max-width:720px;margin:0 auto}
h1{font-size:1.6rem;font-weight:600;letter-spacing:-0.02em;margin-bottom:.25rem}
.subtitle{color:var(--muted);font-size:.9rem}
.search-wrap{max-width:720px;margin:1rem auto 0;padding:0 1.5rem}
.search-box{position:relative}
.search-box input{width:100%;padding:.85rem 1rem .85rem 2.75rem;font-size:1rem;border:1.5px solid var(--border);border-radius:12px;outline:none;background:#fff;color:var(--text);transition:border-color .15s}
.search-box input:focus{border-color:#6366f1}
.search-box svg{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.filters{display:flex;gap:.5rem;margin-top:.85rem;flex-wrap:wrap}
.filter-btn{padding:.35rem .85rem;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:.82rem;cursor:pointer;color:var(--muted);transition:all .15s;font-weight:500}
.filter-btn.active-all{border-color:#6366f1;background:#6366f1;color:#fff}
.filter-btn.active-green{border-color:var(--green-dot);background:var(--green-dot);color:#fff}
.filter-btn.active-yellow{border-color:var(--yellow-dot);background:var(--yellow-dot);color:#fff}
.filter-btn.active-red{border-color:var(--red-dot);background:var(--red-dot);color:#fff}
.legend{display:flex;gap:1.25rem;flex-wrap:wrap;margin-top:.85rem;padding:.7rem 1rem;background:var(--surface);border-radius:10px;border:1px solid var(--border)}
.legend-item{display:flex;align-items:center;gap:.4rem;font-size:.78rem;color:var(--muted)}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.results{max-width:720px;margin:1.25rem auto 3rem;padding:0 1.5rem}
.count{font-size:.82rem;color:var(--muted);margin-bottom:.85rem}
.grid{display:grid;gap:.5rem}
.card{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border:1px solid var(--border);border-radius:10px;background:#fff;transition:border-color .15s}
.card:hover{border-color:#c7d2fe}
.card-left{display:flex;align-items:center;gap:.75rem}
.card-icon{font-size:1.3rem;width:32px;text-align:center;flex-shrink:0}
.food-name{font-weight:500;font-size:.95rem}
.food-meta{font-size:.78rem;color:var(--muted);margin-top:.1rem}
.card-right{display:flex;align-items:center;gap:.75rem;flex-shrink:0}
.badge{padding:.25rem .65rem;border-radius:20px;font-size:.75rem;font-weight:600;letter-spacing:.01em}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow)}
.badge-red{background:var(--red-bg);color:var(--red)}
.status-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.sd-green{background:var(--green-dot)}
.sd-yellow{background:var(--yellow-dot)}
.sd-red{background:var(--red-dot)}
.section-label{font-size:.72rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:.5rem 0 .25rem;margin-top:.5rem}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem}
.portion{font-size:.75rem;color:var(--muted);max-width:160px;text-align:right;line-height:1.3}
@media(max-width:500px){.portion{display:none}.card-right{gap:.5rem}}
</style>
</head>

let activeFilter='all';
let query='';

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    b.className='filter-btn';
  });
  btn.className='filter-btn active-'+f;
  render();
}

function render(){
  const q=query.trim().toLowerCase();
  let filtered=foods.filter(f=>{
    const matchQ=!q||f.n.toLowerCase().includes(q)||f.cat.toLowerCase().includes(q)||f.fodmap.toLowerCase().includes(q);
    const matchF=activeFilter==='all'||f.status===activeFilter;
    return matchQ&&matchF;
  });

  const grid=document.getElementById('grid');
  const count=document.getElementById('count');
  count.textContent=filtered.length+' Lebensmittel';

  if(!filtered.length){
    grid.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p>Kein Ergebnis für «'+query+'»</p></div>';
    return;
  }

  // Group by category
  const groups={};
  filtered.forEach(f=>{
    if(!groups[f.cat])groups[f.cat]=[];
    groups[f.cat].push(f);
  });

  let html='';
  Object.entries(groups).forEach(([cat,items])=>{
    html+=`<div class="section-label">${cat}</div>`;
    items.forEach(f=>{
      const badge=f.status==='green'?'badge-green':f.status==='yellow'?'badge-yellow':'badge-red';
      const sdot='sd-'+f.status;
      const label=f.status==='green'?'Grün':f.status==='yellow'?'Gelb':'Rot';
      html+=`<div class="card">
        <div class="card-left">
          <div class="card-icon">${f.icon}</div>
          <div>
            <div class="food-name">${f.n}</div>
            <div class="food-meta">${f.fodmap}</div>
          </div>
        </div>
        <div class="card-right">
          <div class="portion">${f.portion}</div>
          <span class="badge ${badge}">${label}</span>
          <span class="status-dot ${sdot}"></span>
        </div>
      </div>`;
    });
  });
  grid.innerHTML=html;
}

document.getElementById('search').addEventListener('input',function(){
  query=this.value;
  render();
});

render();
</script>
